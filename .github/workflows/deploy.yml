name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  # Only deploy if CI passes first
  test:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/generator

            # Pull latest code
            git pull origin main

            # Rebuild and restart (zero-downtime: old containers keep serving
            # while new ones build, then Caddy switches over)
            docker compose pull caddy redis
            docker compose up -d --build --remove-orphans

            # Clean up old images
            docker image prune -f
