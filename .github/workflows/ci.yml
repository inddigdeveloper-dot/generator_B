name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gmb_review_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg2://test:test@localhost/gmb_review_test
          SECRET_KEY: ci-test-secret-key-not-used-in-prod
          GOOGLE_CLIENT_ID: placeholder.apps.googleusercontent.com
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg2://test:test@localhost/gmb_review_test
          TEST_DATABASE_URL: postgresql+psycopg2://test:test@localhost/gmb_review_test
          SECRET_KEY: ci-test-secret-key-not-used-in-prod
          GOOGLE_CLIENT_ID: placeholder.apps.googleusercontent.com
        run: pytest tests/ -v --tb=short

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Lint
        working-directory: backend
        run: ruff check app/ --select E,F,W,I --ignore E501

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_GOOGLE_CLIENT_ID: placeholder.apps.googleusercontent.com
          VITE_API_URL: http://localhost:8000
        run: npm run build

      - name: Lint
        working-directory: frontend
        run: npm run lint
